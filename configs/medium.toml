[model]
vocab_size = 4096
n_layers = 6
d_model = 256
d_ffn = 1024
dropout = 0.1

[training]
batch_size = 16
seq_len = 256
max_steps = 50000
warmup_steps = 2000
learning_rate = 6e-4
min_lr = 6e-5
weight_decay = 0.1
grad_accum_steps = 4
eval_every = 1000
save_every = 2000
log_every = 50
clip_grad_norm = 1.0

[tokenizer]
vocab_size = 4096
path = "tokenizer_4k.bpe"

[data]
train_path = "data/train_full.txt"
val_path = "data/val_full.txt"
