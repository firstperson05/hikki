[model]
vocab_size = 512
n_layers = 6      # was 4
d_model = 256     # was 128  
d_ffn = 512
dropout = 0.1
tie_weights = true

[training]
batch_size = 8
seq_len = 256
max_steps = 5000
warmup_steps = 200
learning_rate = 8e-4
min_lr = 8e-5
weight_decay = 0.1
grad_accum_steps = 2
eval_every = 500
save_every = 1000
log_every = 50
clip_grad_norm = 1.0

[tokenizer]
vocab_size = 512
path = "tokenizer_512_new.bpe"
