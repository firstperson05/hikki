[model]
vocab_size = 16384
n_layer = 4
d_model = 256
d_ffn = 512
dropout = 0.0

[train]
batch_size = 64
seq_len = 128
max_steps = 2000
warmup_steps = 100
lr = 1e-3
min_lr = 1e-4
weight_decay = 0.1
grad_accum_steps = 1
eval_every = 500
save_every = 1000
log_every = 10
clip_grad_norm = 1.0
checkpoint_dir = "ckpts"

[tokenizer]
vocab_size = 16384
path = "tokenizer_16k.bpe"

[data]
train_path = "data/train.txt"
