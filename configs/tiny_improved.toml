[model]
vocab_size = 512
n_layers = 4
n_layer = 4  # Add missing field
d_model = 128
seq_len = 128

[train]
batch_size = 4
seq_len = 128
max_steps = 2000      # NOT 100!
warmup_steps = 100
learning_rate = 1e-3
min_lr = 1e-4
weight_decay = 0.1
grad_accum_steps = 1
eval_every = 200
save_every = 500
checkpoint_dir = "ckpts"
clip_grad_norm = 1.0
log_every = 50
lr = 1e-3

[tokenizer]
vocab_size = 512
path = "tokenizer_512.bpe"
